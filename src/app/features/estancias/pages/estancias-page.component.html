<div class="page-layout">

  <app-aside-super-admin-menu />

  <main class="main" [class.expanded]="sidebarSvc.isExpanded()">
    <!-- Topbar -->
    <app-topbar pageTitle="Estancias de Día" (newEstancia)="onNewEstancia()" />
    <div class="content">

      <!-- Encabezado -->
      <div class="page-header">
        <div class="page-title">Estancias</div>
        <div class="page-subtitle">Administración global de todas las estancias registradas</div>
      </div>

      <!-- Stats -->
      <div class="stats-strip">
        <app-stat-card *ngFor="let s of stats" [icon]="s.icon" [value]="s.value" [label]="s.label" [color]="s.color" />
      </div>

      <!-- Filtros -->
      <app-filters-bar (filtersChange)="onFiltersChange($event)" />

      <!-- Tabla -->
      <app-estancias-table [estancias]="estancias" [totalEstancias]="totalEstancias" [currentPage]="currentPage"
        [totalPages]="totalPages" (viewEstancia)="onView($event)" (editEstancia)="onEdit($event)"
        (deleteEstancia)="onDelete($event)" (pageChange)="onPageChange($event)" />

      <!-- Modal Ver Estancia -->
      <app-estancia-view-modal *ngIf="showViewModal" [estancia]="selectedEstancia" (close)="closeViewModal()"
      />

    </div>

  </main>

</div>

<!-- Modal: se agrega FUERA del layout para evitar conflictos de z-index -->
<div class="modal-overlay" *ngIf="mostrarModal" (click)="onModalCancelado()">
  <div (click)="$event.stopPropagation()">
    <app-form-registro (cancelar)="onModalCancelado()" (estanciaCreada)="onEstanciaCreada($event)">
    </app-form-registro>
  </div>
