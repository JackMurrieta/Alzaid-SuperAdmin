<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Estancia</th>
        <th>Contacto</th>
        <th>Dirección</th>
        <th>País</th>
        <th>Estatus</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of estancias">

        <!-- Nombre + ID -->
        <td>
          <div class="estancia-name">{{ row.name }}</div>
          <div class="estancia-id">#{{ row._id }}</div>
        </td>

        <!-- Contacto -->
        <td>
          <div class="contact-email">{{ row.email }}</div>
          <div class="contact-phone">{{ row.phone }}</div>
        </td>

        <!-- Dirección -->
        <td>
          <div class="location-address">{{ row.address }}</div>
          <div class="location-sub">{{ row.description }}</div>
        </td>

        <!-- País -->
        <td class="pais">{{ row.country }}</td>

        <!-- Estatus badge -->
        <td>
          <span class="badge" [ngClass]="getBadgeClass(row.isActive)">
            {{ row.isActive ? 'Activa' : 'Inactiva' }}
          </span>
        </td>

        <!-- ACCIONES -->
        <td>
          <div class="row-actions">

            <!-- Ver detalle -->
            <button class="action-btn view" title="Ver detalle" (click)="onView(row)">
              <span class="material-symbols-outlined">visibility</span>
              <span class="btn-label">Ver</span>
            </button>

            <!-- Editar -->
            <button class="action-btn edit" title="Editar estancia" (click)="onEdit(row)">
              <span class="material-symbols-outlined">edit</span>
              <span class="btn-label">Editar</span>
            </button>

            <!-- Eliminar -->
            <button class="action-btn delete" title="Eliminar estancia" (click)="onDelete(row)">
              <span class="material-symbols-outlined">delete</span>
              <span class="btn-label">Eliminar</span>
            </button>

          </div>
        </td>

      </tr>
    </tbody>
  </table>

  <!-- Footer paginación -->
  <div class="table-footer">
    <span>Mostrando {{ estancias.length }} de {{ totalEstancias }} estancias</span>
    <div class="pagination">
      <button class="page-btn" [disabled]="currentPage === 1" (click)="onPageChange(currentPage - 1)">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <button *ngFor="let p of pages" class="page-btn" [class.active]="p === currentPage" (click)="onPageChange(p)">{{ p
        }}</button>
      <button class="page-btn" [disabled]="currentPage === totalPages" (click)="onPageChange(currentPage + 1)">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
  </div>
</div>
