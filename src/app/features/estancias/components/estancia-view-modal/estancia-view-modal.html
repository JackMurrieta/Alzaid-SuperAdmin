<div class="modal-backdrop">

    <div class="modal-container">

        <!-- HEADER -->
        <div class="modal-header">

            <div>
                <h2>{{ estancia?.name }}</h2>
                <div class="sub">
                    #{{ estancia?._id }}
                    <span class="badge" [ngClass]="estancia?.isActive ? 'badge-active' : 'badge-inactive'">
                        {{ estancia?.isActive ? 'Activa' : 'Inactiva' }}
                    </span>
                </div>
            </div>

            <button class="close-btn" (click)="closeModal()">✕</button>

        </div>

        <!-- BODY -->
        <div class="modal-body" *ngIf="estancia">

            <!-- INFORMACIÓN GENERAL -->
            <section class="section">
                <h3>Información general</h3>

                <div class="grid">

                    <div class="field">
                        <label>Nombre</label>
                        <p>{{ estancia.name }}</p>
                    </div>

                    <div class="field">
                        <label>Descripción</label>
                        <p>{{ estancia.description }}</p>
                    </div>

                    <div class="field">
                        <label>Teléfono</label>
                        <p>{{ estancia.phone }}</p>
                    </div>

                    <div class="field">
                        <label>Correo electrónico</label>
                        <p>{{ estancia.email }}</p>
                    </div>

                </div>
            </section>

            <!-- UBICACIÓN -->
            <section class="section">
                <h3>Ubicación</h3>

                <div class="grid">

                    <div class="field full-width">
                        <label>Dirección</label>
                        <p>{{ estancia.address }}</p>
                    </div>

                    <div class="field">
                        <label>País</label>
                        <p>{{ estancia.country }}</p>
                    </div>

                </div>
            </section>

        </div>

        <!-- FOOTER -->
        <div class="modal-footer">

            <button class="btn-secondary" (click)="closeModal()">
                Cerrar
            </button>

            <button class="btn-primary" (click)="onEdit()">
                Editar Estancia
            </button>

        </div>

    </div>

</div>
