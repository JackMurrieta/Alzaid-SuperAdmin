<aside class="sidebar" (mouseenter)="openSidebar()" (mouseleave)="closeSidebar()">

  <!-- LOGO -->
  <div class="sidebar-logo">
    <div class="logo-icon"></div>
  </div>

  <!-- ADMIN INFO -->
  <div class="sidebar-admin" *ngIf="vm$ | async as vm">

    <!-- Avatar mini -->
    <div class="admin-avatar-mini">
      {{ vm.userInitials }}
    </div>

    <!-- Badge -->
    <div class="admin-badge">
      <strong>{{ vm.userName }}</strong>
      <span>{{ vm.userRole }}</span>
    </div>

  </div>

  <!-- ===================== SCROLL ===================== -->
  <div class="sidebar-scroll">
    <nav class="sidebar-nav">

      <!-- PRINCIPAL -->
      <div class="nav-section">
        <span class="section-label">Principal</span>
      </div>

      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
        <img src="icons-superAdmin/homeIcon.svg" class="icon" />
        <span>Inicio</span>
      </a>

      <!-- GESTIÓN -->
      <div class="nav-section">
        <span class="section-label">Gestión</span>
      </div>

      <!-- ESTANCIAS -->
      <div class="estancias-wrapper" (mouseenter)="openEstancias()" (mouseleave)="closeEstancias()">

        <a class="nav-item expandable" routerLink="/estancias" routerLinkActive="active" (click)="toggleEstancias()">

          <div class="nav-main">
            <img src="icons-superAdmin/estanciasIcon.svg" class="icon" />
            <span>Estancias</span>
          </div>

          <svg class="arrow" [class.rotate]="estanciasOpen" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </a>

        <!-- SUBMENU -->
        <div class="submenu" *ngIf="estanciasOpen">
          <a class="nav-subitem" routerLink="/estancias/operar" routerLinkActive="active">

            <img src="icons-superAdmin/operarEstanciaIcon.svg" class="icon-sub" />
            <span>Operar Estancia</span>
          </a>

          <a class="nav-subitem" routerLink="/estancias/inactivas" routerLinkActive="active">

            <img src="icons-superAdmin/estanciasInactivas.svg" class="icon-sub" />
            <span>Estancias Inactivas</span>
          </a>
        </div>

      </div>

      <!-- Usuarios -->
      <a class="nav-item" routerLink="/usuarios" routerLinkActive="active">
        <img src="icons-superAdmin/usersIcon.svg" class="icon" />
        <span>Usuarios</span>
      </a>

      <a class="nav-item" routerLink="/super/administradores" routerLinkActive="active">
        <img src="icons-superAdmin/administradoresIcon.svg" class="icon" />
        <span>Administradores</span>
      </a>

      <!-- REPORTES -->
      <div class="nav-section">
        <span class="section-label">Reportes</span>
      </div>

      <a class="nav-item" routerLink="/super/metricas" routerLinkActive="active">
        <img src="icons-superAdmin/MetricasIcon.svg" class="icon" />
        <span>Métricas Globales</span>
      </a>

      <a class="nav-item" routerLink="/super/auditoria" routerLinkActive="active">
        <img src="icons-superAdmin/auditoriaIcon.svg" class="icon" />
        <span>Auditoría Global</span>
      </a>

      <a class="nav-item" routerLink="/super/configuracion" routerLinkActive="active">
        <img src="icons-superAdmin/configIcon.svg" class="icon" />
        <span>Configuración</span>
      </a>

    </nav>
  </div>

  <!-- LOGOUT -->
  <div class="sidebar-bottom">
    <a class="nav-item logout" (click)="logout()">
      <img src="icons-superAdmin/logOutIcon.svg" class="icon" />
      <span>Cerrar sesión</span>
    </a>
  </div>

</aside>
